name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy match-engine-lab --project-ref wfkmojrwgerfzjcrpqnl --no-verify-jwt
          supabase functions deploy match-engine --project-ref wfkmojrwgerfzjcrpqnl --no-verify-jwt
          supabase functions deploy energy-regen --project-ref wfkmojrwgerfzjcrpqnl --no-verify-jwt
          supabase functions deploy weekly-finances --project-ref wfkmojrwgerfzjcrpqnl --no-verify-jwt
          supabase functions deploy league-scheduler --project-ref wfkmojrwgerfzjcrpqnl --no-verify-jwt
          supabase functions deploy league-seed --project-ref wfkmojrwgerfzjcrpqnl --no-verify-jwt
