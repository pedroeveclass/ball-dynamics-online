<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 340" width="260" height="340" role="img" aria-label="Football Identity crest">
  <title>Football Identity</title>
  <desc>Escudo heráldico do Football Identity — três estrelas no chief, monograma FI, bola de futebol e banner com o nome.</desc>
  <defs>
    <!-- Classic heater shield path -->
    <path id="fid-shield" d="M 34 24 L 226 24 L 226 130 Q 226 195 208 220 Q 180 262 130 286 Q 80 262 52 220 Q 34 195 34 130 Z"/>

    <!-- Golden rim gradient -->
    <linearGradient id="fid-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>

    <!-- Pitch interior gradient -->
    <linearGradient id="fid-pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#15803d"/>
      <stop offset="55%" stop-color="#0a5730"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>

    <!-- Subtle diagonal sheen -->
    <linearGradient id="fid-sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>

    <clipPath id="fid-clip"><use href="#fid-shield"/></clipPath>

    <!-- 5-pointed star, reusable -->
    <symbol id="fid-star" viewBox="-10 -10 20 20" overflow="visible">
      <polygon points="0,-9 2.6,-3 9,-3 3.9,1.4 5.8,8 0,4 -5.8,8 -3.9,1.4 -9,-3 -2.6,-3" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Gold rim -->
  <use href="#fid-shield" fill="url(#fid-gold)"/>

  <!-- Inner shield (94%) to reveal the gold border -->
  <g transform="translate(130 155) scale(0.93) translate(-130 -155)">
    <use href="#fid-shield" fill="url(#fid-pitch)"/>
    <use href="#fid-shield" fill="url(#fid-sheen)"/>
  </g>

  <!-- CHIEF: top golden band with 3 stars -->
  <g clip-path="url(#fid-clip)">
    <rect x="40" y="46" width="180" height="40" fill="url(#fid-gold)"/>
    <rect x="40" y="44" width="180" height="2.5" fill="#052e16"/>
    <rect x="40" y="86" width="180" height="2.5" fill="#052e16"/>
    <g color="#052e16">
      <use href="#fid-star" x="72"  y="58" width="16" height="16"/>
      <use href="#fid-star" x="119" y="55" width="22" height="22"/>
      <use href="#fid-star" x="172" y="58" width="16" height="16"/>
    </g>
  </g>

  <!-- CENTER CHARGE: bold "FI" monogram -->
  <text x="130" y="200" font-family="'Impact','Arial Black','Helvetica Neue',sans-serif"
        font-size="112" font-weight="900" text-anchor="middle" letter-spacing="6"
        fill="#f5edc9" stroke="#92400e" stroke-width="2.2" paint-order="stroke">FI</text>

  <!-- Football below the monogram (shrinks toward the point) -->
  <g transform="translate(130 243)">
    <circle r="19" fill="#f5edc9" stroke="#052e16" stroke-width="2.5"/>
    <polygon points="0,-7.5 7.2,-2.4 4.4,6.2 -4.4,6.2 -7.2,-2.4" fill="#052e16"/>
    <g stroke="#052e16" stroke-width="1.8" stroke-linecap="round" fill="none">
      <line x1="0"    y1="-7.5" x2="0"   y2="-17"/>
      <line x1="7.2"  y1="-2.4" x2="14"  y2="-7.5"/>
      <line x1="4.4"  y1="6.2"  x2="11"  y2="12.5"/>
      <line x1="-4.4" y1="6.2"  x2="-11" y2="12.5"/>
      <line x1="-7.2" y1="-2.4" x2="-14" y2="-7.5"/>
    </g>
  </g>

  <!-- NAME RIBBON (outside the shield, at the bottom) -->
  <g>
    <!-- Ribbon tails (folded look) -->
    <path d="M 6 302 L 32 292 L 32 318 L 14 322 Z"
          fill="#78350f" stroke="#3a1a03" stroke-width="1"/>
    <path d="M 254 302 L 228 292 L 228 318 L 246 322 Z"
          fill="#78350f" stroke="#3a1a03" stroke-width="1"/>
    <!-- Main ribbon body -->
    <path d="M 32 288 L 228 288 L 224 322 L 36 322 Z"
          fill="url(#fid-gold)" stroke="#3a1a03" stroke-width="1.2"/>
    <!-- Ribbon inner shadow line -->
    <path d="M 36 292 L 224 292" stroke="#92400e" stroke-width="1" opacity="0.6"/>
    <path d="M 38 318 L 222 318" stroke="#fde68a" stroke-width="0.8" opacity="0.7"/>
    <!-- Name -->
    <text x="130" y="312" font-family="'Georgia','Times New Roman',serif"
          font-size="16" font-weight="900" text-anchor="middle"
          fill="#052e16" letter-spacing="4.5">FOOTBALL IDENTITY</text>
  </g>
</svg>
